<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upvc Visualizer - NoiseGard Premium</title>
    <!-- React & Tailwind via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Reset dasar untuk mencegah teks bertumpuk */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background-color: #020617;
        color: white;
        font-family: ui-sans-serif, system-ui, sans-serif;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .animate-spin {
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState } = React;

      const App = () => {
        const [isLoading, setIsLoading] = useState(false);
        const [isEnhancing, setIsEnhancing] = useState(false);
        const [productImage, setProductImage] = useState(null);
        const [productPrompt, setProductPrompt] = useState("");
        const [resultImage, setResultImage] = useState(null);
        const [error, setError] = useState(null);

        const apiKey = ""; // MASUKKAN API KEY ANDA DI SINI

        const enhancePrompt = async () => {
          if (!productPrompt || !apiKey) return;
          setIsEnhancing(true);
          try {
            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  contents: [
                    {
                      parts: [
                        {
                          text: `Reword this interior design prompt to be more professional and detailed in English: "${productPrompt}". Return only the prompt.`,
                        },
                      ],
                    },
                  ],
                }),
              },
            );
            const data = await response.json();
            const enhancedText =
              data.candidates?.[0]?.content?.parts?.[0]?.text;
            if (enhancedText) setProductPrompt(enhancedText.trim());
          } catch (e) {
            console.error(e);
          } finally {
            setIsEnhancing(false);
          }
        };

        const generatePhoto = async () => {
          if (!productImage || !productPrompt || !apiKey) return;
          setIsLoading(true);
          try {
            const base64Data = productImage.split(",")[1];
            const response = await fetch(
              `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`,
              {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  contents: [
                    {
                      parts: [
                        {
                          text: `Integrate this UPVC product into a luxury interior: ${productPrompt}. High quality, photorealistic.`,
                        },
                        {
                          inlineData: {
                            mimeType: "image/png",
                            data: base64Data,
                          },
                        },
                      ],
                    },
                  ],
                  generationConfig: { responseModalities: ["TEXT", "IMAGE"] },
                }),
              },
            );
            const result = await response.json();
            const generatedBase64 =
              result.candidates?.[0]?.content?.parts?.find((p) => p.inlineData)
                ?.inlineData?.data;
            if (generatedBase64)
              setResultImage(`data:image/png;base64,${generatedBase64}`);
          } catch (e) {
            console.error(e);
          } finally {
            setIsLoading(false);
          }
        };

        return (
          <div className="flex-1 flex flex-col">
            <nav className="p-6 border-b border-slate-800 bg-slate-900">
              <div className="max-w-6xl mx-auto flex justify-between items-center">
                <h1 className="text-2xl font-bold text-blue-400">
                  Upvc Visualizer
                </h1>
                <span className="text-xs opacity-50 uppercase tracking-widest">
                  NoiseGard Premium
                </span>
              </div>
            </nav>

            <main className="max-w-6xl mx-auto w-full p-6 grid grid-cols-1 md:grid-cols-2 gap-8">
              <div className="space-y-6 bg-slate-900 p-8 rounded-3xl border border-slate-800">
                <div>
                  <label className="block text-sm mb-2 opacity-60">
                    1. Unggah Foto Aset
                  </label>
                  <input
                    type="file"
                    accept="image/*"
                    onChange={(e) => {
                      const reader = new FileReader();
                      reader.onload = (ev) => setProductImage(ev.target.result);
                      reader.readAsDataURL(e.target.files[0]);
                    }}
                    className="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-500"
                  />
                  {productImage && (
                    <img
                      src={productImage}
                      className="mt-4 h-32 rounded-lg border border-slate-700"
                    />
                  )}
                </div>

                <div>
                  <div className="flex justify-between items-center mb-2">
                    <label className="text-sm opacity-60">
                      2. Deskripsi Ruangan
                    </label>
                    <button
                      onClick={enhancePrompt}
                      className="text-xs text-blue-400 hover:underline"
                    >
                      {isEnhancing ? "Processing..." : "Perbagus Prompt ✨"}
                    </button>
                  </div>
                  <textarea
                    value={productPrompt}
                    onChange={(e) => setProductPrompt(e.target.value)}
                    className="w-full bg-slate-800 border border-slate-700 rounded-xl p-4 h-24 focus:ring-2 focus:ring-blue-500 outline-none"
                    placeholder="Contoh: Jendela ini di ruang tamu mewah bergaya minimalis..."
                  />
                </div>

                <button
                  onClick={generatePhoto}
                  disabled={isLoading || !productImage}
                  className="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all disabled:opacity-30"
                >
                  {isLoading ? "Membangun Visual..." : "GENERATE VISUAL"}
                </button>
              </div>

              <div className="bg-slate-900 rounded-3xl border border-slate-800 border-dashed flex flex-col items-center justify-center p-4">
                {resultImage ? (
                  <div className="w-full h-full flex flex-col">
                    <img
                      src={resultImage}
                      className="flex-1 object-contain rounded-xl"
                    />
                    <a
                      href={resultImage}
                      download="design.png"
                      className="mt-4 text-center py-2 bg-slate-800 rounded-lg text-sm"
                    >
                      Unduh Hasil
                    </a>
                  </div>
                ) : (
                  <p className="opacity-30">
                    Hasil visualisasi akan muncul di sini
                  </p>
                )}
              </div>
            </main>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
